{% extends 'base.html' %}

{% block content %}
<div class="column is-half is-offset-one-quarter">
    <h1 class="title">Edit Profile</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button is-primary">Save</button>
        <a href="{% url 'rutalk:profile' user.profile.pk %}" class="button is-light">Cancel</a>
    </form>
</div>
{% endblock %}
