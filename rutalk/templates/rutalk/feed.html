{% extends 'base.html' %}

{% block content %}
<div class="nav-page">
    <section class="nav-shell compact">
        <div class="nav-shell__header">
            <h2 class="nav-shell__title">Navigation</h2>
        </div>
        <div class="nav-shell__body">
            <div class="nav-list">
                <a href="{% url 'rutalk:profile_list' %}" class="nav-link muted"><span class="button">All Profiles</span></a>
                <a href="{% url 'rutalk:profile' request.user.profile.id %}" class="nav-link"><span class="button">My Profile</span></a>
                <a href="{% url 'rutalk:group_list' %}" class="nav-link muted"><span class="button">All Groups</span></a>
            </div>
        </div>
    </section>
</div>

{% if groups %}
<div class="content-list">
    {% for group in groups %}
        <article class="list-card group-list-card">
            <h3><a href="{% url 'rutalk:group' group.pk %}">{{ group.name }}</a></h3>
            <p>{{ group.description|default:"Без описания" }}</p>
            <small>Members: {{ group.memberships.count }}</small>
        </article>
    {% endfor %}
</div>
{% endif %}
{% endblock content %}
