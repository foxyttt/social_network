{% extends 'base.html' %}

{% block content %}
<div class="section-row">
    <h1 class="section-title">All Groups</h1>
    <a href="{% url 'rutalk:group_create' %}" class="btn">Create group</a>
</div>

{% if groups %}
<div class="content-list">
    {% for group in groups %}
        <article class="list-card group-list-card">
            <h3><a href="{% url 'rutalk:group' group.pk %}">{{ group.name }}</a></h3>
            <p>{{ group.description|default:"Без описания" }}</p>
            <small>Members: {{ group.memberships.count }}</small>
        </article>
    {% endfor %}
</div>
{% else %}
<div class="content-list">
    <article class="list-card group-list-card">
        <p>No groups yet.</p>
    </article>
</div>
{% endif %}
{% endblock %}
