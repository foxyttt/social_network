{% extends 'base.html' %}

{% block content %}
<div class="form-page-shell">
    <h1 class="form-page-title">Создание канала</h1>
    <section class="form-inline-card">
        <div class="app-card__body">
            <form method="post" class="auth-form">
                {% csrf_token %}
                {{ form.non_field_errors }}
                <div class="form-row">
                    <label for="{{ form.name.id_for_label }}">Название канала</label>
                    {{ form.name }}
                    {{ form.name.errors }}
                </div>
                <div class="form-row">
                    <label for="{{ form.description.id_for_label }}">Описание</label>
                    {{ form.description }}
                    {{ form.description.errors }}
                </div>
                <div class="help-text">В канале публиковать посты сможет только владелец.</div>
                <div class="actions-row" style="margin-top: 8px;">
                    <button type="submit" class="btn">Создать</button>
                    <a href="{% url 'rutalk:group_list' %}" class="btn btn-secondary">Назад</a>
                </div>
            </form>
        </div>
    </section>
</div>
{% endblock %}
