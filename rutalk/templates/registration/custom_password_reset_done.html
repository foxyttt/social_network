{% extends "base.html" %}
{% block content %}
<div class="auth-stage">
    <section class="auth-card">
        <div class="card-header">
            <h2 class="card-title">Reset Password</h2>
        </div>
        <div class="card-body">
            <div class="center-copy">
                <p>An email with password reset instructions has been sent to your email address. Please check your inbox and follow instructions to reset your password.</p>
                <div class="status-icon">✓</div>
            </div>
        </div>
        <div class="card-footer">
            <a href="{% url 'rutalk:dashboard' %}" class="btn">Back to dashboard</a>
        </div>
    </section>
</div>
{% endblock content %}
