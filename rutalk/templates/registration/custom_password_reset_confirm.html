{% extends "base.html" %}
{% block content %}
    <h2>Confirm password reset</h2>
    {% if form %}
        <p>Form is present</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="Confirm" />
        </form>
    {% else %}
        <p>Form is not available. The link may be invalid or expired.</p>
    {% endif %}
    <a href="{% url 'rutalk:dashboard' %}">Back to dashboard</a>
{% endblock %}
