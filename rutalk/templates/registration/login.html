{% extends "base.html" %}
{% block content %}
<div class="auth-stage">
    <section class="auth-card">
        <div class="card-header">
            <h2 class="card-title">Вход</h2>
        </div>
        <div class="card-body">
            <form method="post" class="auth-form">
                {% csrf_token %}
                {{ form.non_field_errors }}
                <div class="form-row">
                    <label for="id_username">Имя пользователя:</label>
                    {{ form.username }}
                    {{ form.username.errors }}
                </div>
                <div class="form-row">
                    <label for="id_password">Пароль:</label>
                    {{ form.password }}
                    {{ form.password.errors }}
                </div>
                <div class="actions-center" style="margin-top:22px;">
                    <button type="submit" class="btn">Войти</button>
                </div>
            </form>
        </div>
        <div class="card-footer auth-links-row">
            <a href="{% url 'rutalk:password_reset' %}" class="simple-link">Забыли пароль?</a>
            <a href="{% url 'rutalk:sign_up' %}" class="simple-link">Создать аккаунт</a>
        </div>
    </section>
</div>
{% endblock content %}
