{% extends "base.html" %}
{% block content %}
<div class="auth-stage">
    <section class="auth-card narrow">
        <div class="card-header">
            <h2 class="card-title">Password reset completed</h2>
        </div>
        <div class="card-body center-copy">
            <p>Your password has been changed. You can sign in now.</p>
        </div>
        <div class="card-footer">
            <a href="{% url 'rutalk:login' %}" class="btn">Login</a>
        </div>
    </section>
</div>
{% endblock content %}
