{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuTalk</title>
    <link rel="stylesheet" href="{% static 'rutalk/css/app.css' %}">
</head>
<body>
    <div class="site-shell">
        <div class="page-frame">
            <header class="brand-hero">
                <div style="display:flex; justify-content:space-between; gap:20px; align-items:flex-start;">
                    <div>
                        {% if user.is_authenticated %}
                            <a href="{% url 'rutalk:feed' %}" class="brand-link">
                                <h1 class="brand-title">RuTalk</h1>
                            </a>
                        {% else %}
                            <a href="{% url 'rutalk:dashboard' %}" class="brand-link">
                                <h1 class="brand-title">RuTalk</h1>
                            </a>
                        {% endif %}
                    </div>
                    {% if user.is_authenticated %}
                        <div class="topbar-actions">
                            <form method="post" action="{% url 'rutalk:logout' %}">
                                {% csrf_token %}
                                <input type="hidden" name="next" value="{% url 'rutalk:dashboard' %}">
                                <button type="submit" class="btn btn-light">Выйти</button>
                            </form>
                        </div>
                    {% endif %}
                </div>
            </header>

            <main class="content-area">
                {% block content %}{% endblock content %}
            </main>
        </div>
    </div>
</body>
</html>
